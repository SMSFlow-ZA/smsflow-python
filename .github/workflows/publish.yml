name: Publish PyPI package

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install build
      - run: python -m pip install -e .
      - run: python -m unittest discover -s tests
      - run: python -m build
      - id: package
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          with open("pyproject.toml", "rb") as handle:
              data = tomllib.load(handle)
          print(f"version={data['project']['version']}")
          PY
      - id: published
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import sys
          import urllib.error
          import urllib.request

          version = "${{ steps.package.outputs.version }}"
          try:
              with urllib.request.urlopen("https://pypi.org/pypi/smsflow/json", timeout=30) as response:
                  data = json.load(response)
              exists = version in data.get("releases", {})
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  exists = False
              else:
                  raise
          print(f"exists={str(exists).lower()}")
          PY
      - uses: pypa/gh-action-pypi-publish@release/v1
        if: steps.published.outputs.exists != 'true'
