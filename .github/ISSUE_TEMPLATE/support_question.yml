name: SDK support question
description: Ask a usage question about the SMSFlow Python SDK.
title: "[Support]: "
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: Include sanitized code and error responses only.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: SDK version

